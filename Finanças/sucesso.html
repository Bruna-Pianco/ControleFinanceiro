<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
  <title>Lançamento salvo</title>
  <link rel="stylesheet" href="Style/style.css">
</head>
<body>

  <div class="screen active" id="screen-sucesso">
    <div class="sucesso-wrap">

      <div class="sucesso-icon">
        <svg width="40" height="40" viewBox="0 0 24 24" fill="none" stroke="#3B6D11" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
          <polyline points="20 6 9 17 4 12"/>
        </svg>
      </div>

      <h1 class="sucesso-title">Salvo!</h1>
      <p class="sucesso-sub">Lançamento registrado com sucesso.</p>

      <div class="sucesso-valor" id="suc-valor">—</div>
      <div class="sucesso-tags">
        <span class="tag" id="suc-tipo">—</span>
        <span class="tag tag-cat" id="suc-cat">—</span>
      </div>

      <div class="sucesso-divider"></div>

      <button class="save-btn" onclick="novoLancamento()">+ Novo lançamento</button>
      <button class="outline-btn" onclick="verHistorico()">Ver histórico</button>

    </div>
  </div>

  <script type="module" src="Script/sucesso.js"></script>
</body>
</html>
